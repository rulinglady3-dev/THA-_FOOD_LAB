<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thai Food Laboratory</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="lab">

    <h1>
        🧪 THAI FOOD LABORATORY 🍜
    </h1>

    <p class="subtitle">
        Exotic flavors are being analyzed...
    </p>


    <div class="scanner">

        <div class="scan-line"></div>

        <div class="food">
            🍜
        </div>

    </div>


    <button id="start">
        START EXPERIMENT
    </button>


    <div id="result">
        
    </div>
    <div class="food-selection" id="foodSelection">

    <h2>SELECT FOOD SAMPLE</h2>

    <div class="foods">


        <div class="food-card" data-food="Pad Thai">
            <img src="images/padthai.jpg">
            <h3>🍜 Pad Thai</h3>
        </div>


        <div class="food-card" data-food="Tom Yum Soup">
            <img src="images/tomyum.jpg">
            <h3>🍲 Tom Yum Soup</h3>
        </div>


        <div class="food-card" data-food="Green Curry">
            <img src="images/greencurry.jpg">
            <h3>🍛 Green Curry</h3>
        </div>


        <div class="food-card" data-food="Mango Sticky Rice">
            <img src="images/mango.jpg">
            <h3>🥭 Mango Sticky Rice</h3>
        </div>


        <div class="food-card" data-food="Thai Tea">
            <img src="images/thaitea.jpg">
            <h3>🧋 Thai Tea</h3>
        </div>


        <div class="food-card" data-food="Pa Thong Ko">
            <img src="images/pathongko.jpg">
            <h3>🍩 Pa Thong Ko</h3>
        </div>


        <div class="food-card" data-food="Curry Crab">
            <img src="images/currycrab.jpg">
            <h3>🦀 Curry Crab</h3>
        </div>


        <div class="food-card" data-food="Kai Ping">
            <img src="images/kaiping.jpg">
            <h3>🍢 Kai Ping</h3>
        </div>


        <div class="food-card" data-food="Pad Krapow">
            <img src="images/padkrapow.jpg">
            <h3>🍚 Pad Krapow</h3>
        </div>


    </div>

</div>


</div>


<script src="script.js"></script>
<div id="scannerScreen" class="scanner-screen">

    <div class="scanner-box">

        <img id="scanImage" src="" alt="Food">

        <div class="laser"></div>

        <h2 id="scanTitle"></h2>

        <div class="progress">

            <div id="progressBar"></div>

        </div>

        <p id="progressText">0%</p>

    </div>

</div>

</body>
</html>
